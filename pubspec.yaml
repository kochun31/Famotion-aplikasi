name: famotion
description: FAmotion AI Professional Motion Control Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  url_launcher: ^6.2.4
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.0
  flutter_native_splash: ^2.3.10
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "253669.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "253669.png"

flutter_native_splash:
  color: "#0F172A"
  image: "253669.png"
  android: true
  ios: false
  android_12:
    image: "253669.png"
    color: "#0F172A"
