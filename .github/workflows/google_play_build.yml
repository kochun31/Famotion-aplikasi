name: Build Release (Play Store Ready)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java for Android
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Initialize Flutter Project
        run: |
          flutter create --project-name famotion --org com.famotion.ai .
          
      - name: Apply Custom Configuration
        run: |
          cp -r lib/* .
          flutter pub get

      - name: Generate Splash Screen & Launcher Icons
        run: |
          flutter pub run flutter_native_splash:create
          flutter pub run flutter_launcher_icons

      - name: Optimize Android Settings for Google Play
        run: |
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          
          sed -i '/buildTypes {/a \        release {\n            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"\n        }' android/app/build.gradle

          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="famotion"/android:label="FAmotion AI" android:hardwareAccelerated="true"/g' android/app/src/main/AndroidManifest.xml

      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FAmotion-AI-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FAmotion-AI-Release-AAB
          path: build/app/outputs/bundle/release/app-release.aab
