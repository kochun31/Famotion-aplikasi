name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Initialize Flutter Project
        run: |
          flutter create --project-name famotion_app --org com.famotion.app .
          
      - name: Add WebView Dependency
        run: flutter pub add webview_flutter

      - name: Inject Custom Code
        run: |
          rm lib/main.dart
          cp main_app.dart lib/main.dart

      - name: Add Internet Permission to AndroidManifest
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FAmotion-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
