name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Initialize Flutter Project
        run: |
          # Mengatur nama internal package menjadi famotion
          flutter create --project-name famotion --org com.famotion.ai .
          
      - name: Add Dependencies
        run: |
          flutter pub add webview_flutter
          flutter pub add -d flutter_launcher_icons

      - name: Configure App Name and Logo
        run: |
          # Mengubah nama aplikasi yang muncul di layar HP menjadi "FAmotion AI"
          sed -i 's/android:label="famotion"/android:label="FAmotion AI"/g' android/app/src/main/AndroidManifest.xml
          
          # Menambahkan konfigurasi logo ke dalam pubspec.yaml
          echo "" >> pubspec.yaml
          echo "flutter_launcher_icons:" >> pubspec.yaml
          echo "  android: true" >> pubspec.yaml
          echo "  ios: false" >> pubspec.yaml
          echo "  image_path: \"253669.png\"" >> pubspec.yaml
          
          # Mengeksekusi pembuatan logo
          flutter pub run flutter_launcher_icons

      - name: Inject Custom Code
        run: |
          rm lib/main.dart
          cp main_app.dart lib/main.dart

      - name: Add Internet Permission to AndroidManifest
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FAmotion-AI-APK
          path: build/app/outputs/flutter-apk/app-release.apk
